services:
  localstack:
    # Pinned to prevent breakage from upstream changes. Update deliberately.
    image: localstack/localstack:4.4.0
    ports:
      - '4566:4566'
    environment:
      - SERVICES=dynamodb
      - DEBUG=0
    volumes:
      - './backend/localstack-init:/etc/localstack/init/ready.d'
      - localstack-data:/var/lib/localstack
volumes:
  localstack-data:
