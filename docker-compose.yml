services:
  ministack:
    # High-performance drop-in replacement for LocalStack
    image: ministack/ministack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=dynamodb
      - DEBUG=0
    volumes:
      - './backend/localstack-init:/etc/localstack/init/ready.d'
      - ministack-data:/var/lib/ministack
volumes:
  ministack-data:
