name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.sync/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.sync/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
      FINNHUB_API_KEY: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Frontend tests
        run: npm test

      - name: Backend type check
        run: cd backend && npx tsc --noEmit

      - name: Backend tests
        run: cd backend && npm test -- --ci

      - name: Python tests
        run: |
          pip install -r backend/python/requirements.txt
          pip install -r backend/python/requirements-dev.txt
          PYTHONPATH=backend/python pytest backend/python_tests --maxfail=1 -v
